<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>✨ Birthday Experience ✨</title>

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #0f2027, #2c5364, #1c1c3c, #000);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color:white;
    overflow-x:hidden;
}

@keyframes gradient {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* SECTIONS */
section {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* GLASS EFFECT */
.glass {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,255,255,0.1);
}

/* DOOR */
.door-box {
    width:1500px;
    height:500px;
	background:url("pic14.jpeg") no-repeat center center fixed;
    background-size:auto;
    perspective:1000px;
    position:relative;
}

.door {
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#FFB6C1,#333);
    transition:1.8s;
}

.left { left:0; transform-origin:left;}
.right { right:0; transform-origin:right;}

.open .left { transform:rotateY(-110deg);}
.open .right { transform:rotateY(110deg);}

/* BUTTON */
button {
    padding:12px 20px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,pink,orange);
    color:white;
    cursor:pointer;
    margin-top:20px;
}

/* TYPING */
#typing {
    font-size:28px;
    text-align:center;
}

/* GALLERY */
.gallery {
    display:flex;
    flex-direction:column;
    gap:80px;
    padding:50px;
}

.card {
    opacity:0;
    transform:translateY(80px) scale(0.9);
    transition:1s;
}

.card.show {
    opacity:1;
    transform:translateY(0) scale(1);
}

img, video {
    width:320px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

/* BIG TEXT */
#bigText {
    font-size:2.2em;
    text-align:center;
    margin-top:50px;
    color:gold;
}

/* HEART FLOAT */
.heart {
    position:fixed;
    bottom:0;
    animation:float 6s linear infinite;
}

@keyframes float {
    to { transform:translateY(-800px); opacity:0;}
}

/* VOICE */
.voice {
    margin-top:30px;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    50%{transform:scale(1.1);}
}
</style>
</head>

<body>

<!-- DOOR -->
<section>
<div class="glass">
<div class="door-box" id="door">
<div class="door left"></div>
<div class="door right"></div>
</div>
<button onclick="openDoor()">Enter Surprise 🎁</button>
</div>
</section>

<!-- MUSIC -->
<section id="music">
<div class="glass">
<h2>🎵 Tap to begin magic</h2>
<button onclick="playMusic()">Play Music</button>
<button onclick="go('msg')">Continue</button>
</div>
</section>

<!-- MESSAGE -->
<section id="msg">
<div class="glass">
<h1 id="typing"></h1>
<button onclick="go('pass')">Next 💖</button>
</div>
</section>

<!-- PASSWORD -->
<section id="pass">
<div class="glass">
<h2>Enter Secret 🔐</h2>
<input id="p" type="password">
<button onclick="check()">Unlock</button>
</div>
</section>

<!-- SURPRISE -->
<section id="surprise">
<h1>🎉 Surprise 🎉</h1>

<div class="gallery" id="gallery"></div>

<h2 id="bigText"></h2>

<div class="voice">
<button onclick="voice()">🎤 Voice Message</button>
</div>
</section>

<audio id="bg" src="music.mp3"></audio>
<audio id="voice" src="voice.mp3"></audio>

<script>
// DOOR
function openDoor(){
    document.getElementById("door").classList.add("open");
    setTimeout(()=>go('music'),1500);
}

// SCROLL
function go(id){
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

// MUSIC
function playMusic(){
    document.getElementById("bg").play();
}

// PASSWORD
function check(){
    if(document.getElementById("p").value==="1234"){
        go('surprise');
        load();
        bigMsg();
    } else alert("Wrong password");
}

// TYPING
let t="Happy Birthday 🎉 You are truly special ❤️";
let i=0;
(function(){
    if(i<t.length){
        document.getElementById("typing").innerHTML+=t[i++];
        setTimeout(arguments.callee,50);
    }
})();

// LOAD CONTENT
function load(){
    let g=document.getElementById("gallery");

    for(let i=1;i<=12;i++){
        let d=document.createElement("div");
        d.className="card";

        let img=document.createElement("img");
        img.src="img"+i+".jpg";
        img.onerror=()=>img.remove();

        d.appendChild(img);
        d.innerHTML+="<p>Memory "+i+"</p>";
        g.appendChild(d);

        setTimeout(()=>d.classList.add("show"),i*200);
    }

    ["video1.mp4","video2.mp4"].forEach((v,i)=>{
        let d=document.createElement("div");
        d.className="card";

        let vid=document.createElement("video");
        vid.src=v;
        vid.controls=true;

        d.appendChild(vid);
        g.appendChild(d);

        setTimeout(()=>d.classList.add("show"),3000+i*300);
    });
}

// BIG MESSAGE
function bigMsg(){
    let txt="💖 You make life beautiful. Stay happy always 💖";
    let j=0;
    (function(){
        if(j<txt.length){
            document.getElementById("bigText").innerHTML+=txt[j++];
            setTimeout(arguments.callee,40);
        }
    })();
}

// HEARTS
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},500);

// VOICE
function voice(){
    document.getElementById("voice").play();
}
</script>

</body>
</html>
